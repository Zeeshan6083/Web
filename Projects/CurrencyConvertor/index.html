<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .converter-card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 600px;
      width: 100%;
    }
    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    .flag-img {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      margin-bottom: 0.5rem;
      background: #f0f0f0;
    }
    .swap-btn {
      background: #667eea;
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
      white-space: nowrap;
    }
    .swap-btn:hover {
      transform: rotate(180deg);
    }
    .convert-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .result {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-top: 1.5rem;
      color: #28a745;
      min-height: 2.5rem;
    }
    .error-msg {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.25rem;
      display: none;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
    .country-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .country-column {
      flex: 1;
      min-width: 0;
    }
    @media (max-width: 480px) {
      .converter-card {
        padding: 1.5rem;
      }
      .flag-img {
        width: 48px;
        height: 48px;
      }
      .swap-btn {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="converter-card">
    <h1>Currency Converter</h1>
    
    <div class="country-row">
      <div class="country-column">
        <div class="text-center">
          <img id="flag1" class="flag-img" src="" alt="Flag"/>
          <select id="country1" class="form-select">
            <option value="" disabled selected>Select Country</option>
          </select>
        </div>
        <div id="error1" class="error-msg">Please select a 'From' country.</div>
      </div>
      
      <div class="text-center" style="flex-shrink: 0;">
        <button id="swapBtn" class="swap-btn">
          <i class="bi bi-arrow-left-right"></i>
        </button>
      </div>
      
      <div class="country-column">
        <div class="text-center">
          <img id="flag2" class="flag-img" src="" alt="Flag"/>
          <select id="country2" class="form-select">
            <option value="" disabled selected>Select Country</option>
          </select>
        </div>
        <div id="error2" class="error-msg">Please select a 'To' country.</div>
      </div>
    </div>

    <div class="mt-3">
      <label for="orgAmount" class="form-label">Enter amount</label>
      <input type="number" id="orgAmount" class="form-control" placeholder="Enter amount" min="0.01" step="0.01"/>
      <div id="errorAmount" class="error-msg"></div>
    </div>

    <button id="convertBtn" class="btn btn-primary convert-btn mt-3">
      <span id="btnText">Convert</span>
      <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
    </button>

    <div id="result" class="result"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
