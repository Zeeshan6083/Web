<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
</head>

<body class=" bg-dark bg-gradient min-vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg border-0 rounded-4 p-4 w-50 mx-3 " >

    <h1 class="text-center mb-4 fs-2 fw-bold ">
      Currency Converter
    </h1>

    <div class="row align-items-center g-3">

      
      <div class="col-5 text-center">

        <img 
          id="flag1"
          src=""
          alt="Flag"
          class="rounded mb-2 bg-light"
          width="64"
          height="64"
        >

        <select id="country1" class="form-select">
          <option value="" disabled selected>Select Country</option>
        </select>

        <div id="error1" class="text-danger small mt-1 d-none">
          Please select a 'From' country.
        </div>
      </div>

      
      <div class="col-2 text-center">

        <button 
          id="swapBtn"
          class="btn btn-primary square-rounded-circle "
          style="width: 45px; height: 45px;"
        >
          <i class="bi bi-arrow-left-right bg-"></i>
        </button>

      </div>

      
      <div class="col-5 text-center">

        <img 
          id="flag2"
          src=""
          alt="Flag"
          class="rounded mb-2 bg-light"
          width="64"
          height="64"
        >

        <select id="country2" class="form-select">
          <option value="" disabled selected>Select Country</option>
        </select>

        <div id="error2" class="text-danger small mt-1 d-none">
          Please select a 'To' country.
        </div>
      </div>

    </div>
    <div class="mt-4">

      <label for="orgAmount" class="form-label fw-semibold">
        Enter Amount
      </label>

      <input
        type="number"
        id="orgAmount"
        class="form-control"
        placeholder="Enter amount"
        min="0.01"
        step="0.01"
      >

      <div id="errorAmount" class="text-danger small mt-1 d-none"></div>

    </div>

    
    <button id="convertBtn" class="btn btn-outline-primary mt-4 py-2 fw-semibold">

      <span id="btnText">
        Convert
      </span>

      <span 
        id="spinner"
        class="spinner-border spinner-border-sm d-none ms-2"
        role="status"
      ></span>

    </button>

    <div 
      id="result"
      class="text-center text-success fw-bold fs-4 mt-4"
    ></div>

  </div>

  <!-- <script> -->

  <script src="script.js"></script>

</body>
</html>
