<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body class="bg-dark text-light">
 <header class="bg-gradient text-light p-4 text-center">
      <div class="d-flex justify-content-between align-items-center">
        <h2>Password Manager</h2>

        <div class="d-flex gap-5">
          <a href="index.html" class="text-decoration-none text-white fs-5"
            >Add new Password</a
          >
          <a
            href="index2.html"
            class="text-decoration-none text-white fs-5"
            >View Saved Password</a
          >
        </div>
      </div>
    </header>
    <main>
      <div class="mx-auto border rounded m-3 p-2 w-50">
        <div>
          <h2 class="text-center">Password Manager</h2>
        </div>
        <form action="" id="pmform">
          <input
            type="text"
            name="siteName"
            id="siteName"
            placeholder="Enter Your site Name"
            class="form-control"
          />

          <input
            type="text"
            name="username"
            id="username"
            placeholder="Enter Your User Name"
            class="form-control my-3"
          />

          <input
            type="text"
            name="Password"
            id="Password"
            placeholder="Enter Your Password"
            class="form-control"
          />

          <div
            class="d-flex gap-4 p-4 align-content-between justify-content-center"
          >
            <button type="reset" class="btn  btn-danger ">clear</button>
            <button type="submit" class="btn btn-primary ">submit</button>
          </div>
        </form>
      </div>
    </main>

    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
