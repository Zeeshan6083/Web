<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tip Calculator</title>
    <link rel="icon" type="image" href="./calculator.png">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-info-subtle">
    <div class="w-25 bg-light rounded shadow border mx-auto mt-5 p-3 rounded-5">
      <h1 class="text-center mb-3">Tip Calculator</h1>

      <form id="tipForm" class="d-flex flex-column gap-3 w-100">
        <label class="form-label text-start mb-0"> Bill Amount </label>

        <div class="form-control d-flex border-0 bg-transparent mt-0 pt-0">
          <input
            type="number"
            id="billAmount"
            class="w-100"
            placeholder="Amount to be paid"
          />

          <i class="bi bi-currency-rupee h3"></i>
        </div>

        <label class="form-label"> How was the service ? </label>

        <select id="disCount" class="form-control">
          <option value="0">Select</option>

          <option value="0.25">25% - Top Notch</option>
          <option value="0.20">20% - Excellent</option>
          <option value="0.15">15% - Good</option>
          <option value="0.10">10% - Bad</option>
          <option value="0.05">5% - Worst</option>
        </select>

        <div class=" form-control bg-transparent border-0">
          <label class="form-label heading-text">
            Total number of persons
          </label>

          <input
            type="number"
            id="totalPersons"
            class="form-control"
            placeholder="Number of people sharing the bill"
          />
        </div>

        <button type="submit" class="btn btn-primary">
          Calculate
        </button>
        <br />
        <div id="result" class="mt-0 text-center">
          <h4>
            Tip Per Person :
            <br> ₹ <span id="tipAmount">0</span>
          </h4>
        </div>
      </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
