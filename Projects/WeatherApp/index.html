<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Weather App</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  >




  
</head>

<body
  id="body"
  class="d-flex justify-content-center align-items-center vh-100"
  style="
  background-image:
  linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
  url('https://images.unsplash.com/photo-1534088568595-a066f410bcda?q=80&w=1600&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  transition:0.5s;
  "
>

  <div
    class="card text-center text-white border-0 p-4 shadow-lg"
    style="
    width:450px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:25px;
    "
  >

    <h1 class="fw-bold mb-4">
      <i class="bi bi-cloud-sun-fill"></i>
      Weather App
    </h1>

    <input
      type="text"
      id="cityName"
      class="form-control mb-3"
      placeholder="Enter city name"
    >

    <button
      class="btn btn-info text-white fw-bold mb-3"
      onclick="getWeather()"
    >
      Get Weather
    </button>

    <div id="weatherBox" class="d-none">

      <i class="bi bi-cloud-fill display-1 text-light"></i>

      <h2 id="city" class="fw-bold mt-2"></h2>

      <h1 id="temperature" class="display-3 fw-bold"></h1>

      <h4 id="condition"></h4>

      <div
        class="rounded-4 p-3 mt-4"
        style="background:rgba(255,255,255,0.15)"
      >

        <p>
          <i class="bi bi-moisture"></i>
          Humidity :
          <span id="humidity"></span>%
        </p>

        <p>
          <i class="bi bi-wind"></i>
          Wind :
          <span id="wind"></span> km/h
        </p>

        <p>
          <i class="bi bi-thermometer-half"></i>
          Feels Like :
          <span id="feelsLike"></span>°C
        </p>

        <p>
          <i class="bi bi-eye"></i>
          Visibility :
          <span id="visibility"></span> km
        </p>

        <p class="mb-0">
          <i class="bi bi-speedometer2"></i>
          Pressure :
          <span id="pressure"></span> hPa
        </p>

      </div>

    </div>

    <button
      id="homeBtn"
      class="btn btn-light fw-bold mt-4 d-none"
      onclick="goHome()"
    >
      <i class="bi bi-house-door-fill"></i>
      Back To Home
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>
