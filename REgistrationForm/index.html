<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coaching Registration Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="form-container ">

    <h2>Coaching Institute Registration Form</h2>

    <form id="registrationForm">

      <h4 class="section-title">Personal Information</h4>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullName">
        <div class="error" id="nameError"></div>
      </div>

      
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="text" class="form-control" id="email">
        <div class="error" id="emailError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Mobile Number</label>
        <input type="text" class="form-control" id="mobile">
        <div class="error" id="mobileError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Date of Birth</label>
        <input type="date" class="form-control" id="dob">
        <div class="error" id="dobError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Gender</label>
        <select class="form-select" id="gender">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
 
      <h4 class="section-title">Academic Details</h4>

      <div class="mb-3">
        <label class="form-label">Last Completed Qualification</label>

        <select class="form-select" id="qualification">
          <option value="">Select Qualification</option>
          <option>10th</option>
          <option>12th</option>
          <option>Graduate</option>
          <option>Postgraduate</option>
        </select>

        <div class="error" id="qualificationError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Percentage / Grade</label>
        <input type="text" class="form-control" id="percentage">
        <div class="error" id="percentageError"></div>
      </div>

      <h4 class="section-title">Course Information</h4>

      <div class="mb-3">
        <label class="form-label">Preferred Course</label>

        <select class="form-select" id="course">
          <option value="">Select Course</option>
          <option>IIT-JEE</option>
          <option>NEET</option>
          <option>Banking Exams</option>
          <option>UPSC</option>
        </select>

        <div class="error" id="courseError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Batch Timing Preference</label>

        <select class="form-select" id="batch">
          <option value="">Select Batch</option>
          <option>Morning</option>
          <option>Afternoon</option>
          <option>Evening</option>
          <option>Weekend</option>
        </select>

        <div class="error" id="batchError"></div>
      </div>

      <h4 class="section-title">Address</h4>

      <div class="mb-3">
        <label class="form-label">Residential Address</label>
        <textarea class="form-control" id="address"></textarea>
        <div class="error" id="addressError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">City</label>
        <input type="text" class="form-control" id="city">
        <div class="error" id="cityError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Pin Code</label>
        <input type="text" class="form-control" id="pincode">
        <div class="error" id="pincodeError"></div>
      </div>

      <h4 class="section-title">Guardian Details</h4>

      <div class="mb-3">
        <label class="form-label">Guardian's Full Name</label>
        <input type="text" class="form-control" id="guardianName">
        <div class="error" id="guardianNameError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Guardian's Contact Number</label>
        <input type="text" class="form-control" id="guardianMobile">
        <div class="error" id="guardianMobileError"></div>
      </div>

      <h4 class="section-title">Additional Information</h4>

      <div class="mb-3">
        <label class="form-label">How did you hear about us?</label>

        <select class="form-select" id="reference">
          <option value="">Select Option</option>
          <option>Friends</option>
          <option>Online Ad</option>
          <option>Newspaper</option>
          <option>Social Media</option>
          <option>Other</option>
        </select>

        <div class="error" id="referenceError"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Special Requirements</label>
        <textarea class="form-control"></textarea>
      </div>

      <button class="btn btn-primary w-100">
        Register
      </button>

    </form>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
